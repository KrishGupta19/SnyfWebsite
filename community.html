  <script>
    const TRUST_LEVELS = {

      },
      {

        zone: 'Khan Market',

        scores: { food: 7.5, ambience: 8.5, service: 5.5, value: 6.0, wait: 6.5 },
        note: 'Beautiful space. Service was slow on a weekday afternoon.',
        verified: true,

        reactions: { accurate: 10, outdated: 4, helpful: 15 }
      },
      {

        score: 8.2,
        scores: { food: 8.0, ambience: 8.5, service: 8.2, value: 8.5, wait: 8.0 },
        note: 'Reliable work cafe. Fast service and steady quality.',
        verified: true,

        reviewer: '@laptop_warrior',
        time: '1d ago',
        daysAgo: 1,
        reactions: { accurate: 16, outdated: 1, helpful: 29 }
      },
      {
        id: 6,
        cafe: 'Urban Cafe',
        zone: 'DLF Phase 4',
        score: 4.1,
        scores: { food: 4.5, ambience: 5.0, service: 3.5, value: 4.0, wait: 3.0 },
        note: 'Several details did not match recent community reports.',
        verified: false,
        flagged: true,
        trustLevel: 'standard',
        reviewer: '@anon_whistle',
        time: '2d ago',
        daysAgo: 2,
        reactions: { accurate: 1, outdated: 5, helpful: 4 }
      },
      {
        id: 7,
        cafe: 'Fig & Maple',
        zone: 'Sector 29',
        score: 8.4,
        scores: { food: 8.8, ambience: 8.5, service: 8.0, value: 8.0, wait: 8.2 },
        note: 'Great brunch pacing. Pricey, but the experience feels cared for.',
        verified: true,
        flagged: false,
        trustLevel: 'anchor',
        reviewer: '@brunch_guru',
        time: '3d ago',
        daysAgo: 3,
        reactions: { accurate: 19, outdated: 0, helpful: 31 }
      },
      {
        id: 8,
        cafe: 'Raasta',
        zone: 'Cyber Hub',
        score: 5.2,
        scores: { food: 5.5, ambience: 7.0, service: 4.5, value: 5.0, wait: 4.0 },
        note: 'Fun for groups, inconsistent kitchen timing.',
        verified: false,
        flagged: true,
        trustLevel: 'standard',
        reviewer: '@night_crawler',
        time: '4d ago',
        daysAgo: 4,
        reactions: { accurate: 3, outdated: 6, helpful: 9 }
      },
    ];

    const CH_TICKER_EVENTS = [
      '✓ Blue Tokai, Cyber Hub — trust score updated',
      '⚠ Suspicious spike — Sector 29 cluster · flagged',
      '◈ 12 new reports verified — Cyber Hub',
      '✓ Nook Café — Anchor reviewer report indexed',
      '⚠ Pattern detected — 8 consecutive 5★ same IP',
      '◈ Fig & Maple score recalculated · 92% confidence',
      '✓ Perch, Khan Market — 94% confidence confirmed',
      '⚠ Wait time anomaly — Farzi Café flagged',
    ];

    const dimensions = [
      { key: 'food', label: 'Food' },
      { key: 'ambience', label: 'Ambience' },
      { key: 'service', label: 'Service' },
      { key: 'value', label: 'Value' },
      { key: 'wait', label: 'Wait Time' },
    ];

    const state = {
      filter: 'all',
      zone: 'all',
      sort: 'recent',
      search: '',
      form: { place: '', scores: { food: 5, ambience: 5, service: 5, value: 5, wait: 5 } },
    };

    const $ = selector => document.querySelector(selector);
    const $$ = selector => Array.from(document.querySelectorAll(selector));

    function initTicker() {
      const ticker = document.getElementById('ch-ticker');
      if (!ticker) return;
      let pool = [...CH_TICKER_EVENTS];
      let shuffled = pool.sort(() => Math.random() - 0.5);
      // Build inner content — duplicate for seamless loop
      const content = [...shuffled, ...shuffled].map(e => {
        const isFlag = e.startsWith('⚠');
        const isNew  = e.startsWith('◈');
        return `<span class="ch-tick-item ${isFlag ? 'ch-tick--flag' : isNew ? 'ch-tick--new' : 'ch-tick--ok'}">${e}</span>`;
      }).join('<span class="ch-tick-sep">·</span>');

      ticker.innerHTML = content;
    }

    function renderReport(r) {
      const tl = TRUST_LEVELS[r.trustLevel] || TRUST_LEVELS.standard;
      const overall = ((r.scores.food*0.3)+(r.scores.ambience*0.2)+(r.scores.service*0.2)+(r.scores.value*0.2)+(r.scores.wait*0.1)).toFixed(1);
      const isLow = parseFloat(overall) < 5.5;
      const scoreColor = isLow ? '#D97A4A' : parseFloat(overall) >= 8 ? '#7BC6A4' : '#6FB7D6';

      return `
      <article class="ch-card ${r.flagged ? 'ch-card--flagged' : ''}" data-id="${r.id}"
        data-zone="${r.zone}" data-verified="${r.verified}"
        data-flagged="${r.flagged}" data-days="${r.daysAgo}"
        data-score="${overall}" data-helpful="${r.reactions.helpful}">

        ${r.flagged ? `<div class="ch-card-flag">⚠ Anomaly detected — pattern flagged for review</div>` : ''}

        <!-- Card header row -->
        <div class="ch-card-head">
          <div class="ch-card-place">
            <div class="ch-card-name">${r.cafe}</div>
            <div class="ch-card-zone">${r.zone}</div>
          </div>
          <div class="ch-card-score-wrap">
            <div class="ch-card-score" style="color:${scoreColor}">${overall}</div>
            <div class="ch-card-score-label">/10</div>
          </div>
        </div>

        <!-- 5 dimension bars — compact horizontal -->
        <div class="ch-dims">
          ${renderDimBar('Food', r.scores.food)}
          ${renderDimBar('Ambience', r.scores.ambience)}
          ${renderDimBar('Service', r.scores.service)}
          ${renderDimBar('Value', r.scores.value)}
          ${renderDimBar('Wait', r.scores.wait)}
        </div>

        <!-- Note -->
        ${r.note ? `<p class="ch-card-note">"${r.note}"</p>` : ''}

        <!-- Footer -->
        <div class="ch-card-foot">
          <div class="ch-card-reviewer">
            <span class="ch-trust-badge" style="color:${tl.color};border-color:${tl.color}40">
              ${tl.icon} ${tl.label}
            </span>
            <span class="ch-handle">${r.reviewer}</span>
            <span class="ch-time">${r.time}</span>
            ${r.verified ? '<span class="ch-verified-tick">✓ verified</span>' : ''}
          </div>
          <div class="ch-reactions">
            <button class="ch-react" data-reaction="accurate" data-id="${r.id}">
              ✓ <span>${r.reactions.accurate}</span>
            </button>
            <button class="ch-react" data-reaction="outdated" data-id="${r.id}">
              ⏱ <span>${r.reactions.outdated}</span>
            </button>
            <button class="ch-react" data-reaction="helpful" data-id="${r.id}">
              💡 <span>${r.reactions.helpful}</span>
            </button>
          </div>
        </div>

      </article>`;
    }

    function renderDimBar(label, score) {
      const isFlagged = score < 5.0;
      const pct = (score / 10 * 100).toFixed(0);
      return `
      <div class="ch-dim">
        <span class="ch-dim-label">${label}</span>
        <div class="ch-dim-track">
          <div class="ch-dim-fill ${isFlagged ? 'ch-dim-fill--bad' : ''}" style="width:${pct}%"></div>
        </div>
        <span class="ch-dim-val ${isFlagged ? 'ch-dim-val--bad' : ''}">${score.toFixed(1)}</span>
      </div>`;
    }

    function animateScoreBars() {
      document.querySelectorAll('.ch-dim-fill').forEach(bar => {
        const target = bar.style.width;
        bar.style.width = '0%';
        requestAnimationFrame(() => {
          setTimeout(() => { bar.style.width = target; }, 60);
        });
      });
    }

    function filteredReports() {
      const query = state.search.toLowerCase();
      return reports
        .filter(report => state.filter === 'all' || (state.filter === 'verified' && report.verified) || (state.filter === 'flagged' && report.flagged))
        .filter(report => state.zone === 'all' || report.zone === state.zone)
        .filter(report => !query || report.cafe.toLowerCase().includes(query) || report.zone.toLowerCase().includes(query) || report.note.toLowerCase().includes(query))
        .sort((a, b) => {
          const overallA = ((a.scores.food*0.3)+(a.scores.ambience*0.2)+(a.scores.service*0.2)+(a.scores.value*0.2)+(a.scores.wait*0.1));
          const overallB = ((b.scores.food*0.3)+(b.scores.ambience*0.2)+(b.scores.service*0.2)+(b.scores.value*0.2)+(b.scores.wait*0.1));
          if (state.sort === 'score') return overallB - overallA;
          if (state.sort === 'helpful') return b.reactions.helpful - a.reactions.helpful;
          return a.id - b.id;
        });
    }

    function renderReports() {
      const list = $('#feed-list');
      const data = filteredReports();
      $('#feed-count').textContent = `Showing ${data.length} report${data.length === 1 ? '' : 's'}`;
      list.innerHTML = data.length ? data.map(report => renderReport(report)).join('') : '<div class="panel empty">No reports match this view.</div>';
      
      animateScoreBars();

      $$('.ch-card').forEach((card, index) => {
        card.style.animationDelay = `${Math.min(index * 0.055, 0.35)}s`;
      });
    }

    function renderStats() {
      const verified = reports.filter(report => report.verified).length;
      // Calculate avg confidence based on overall score avg
      const confidenceSum = reports.reduce((sum, r) => {
        const overall = ((r.scores.food*0.3)+(r.scores.ambience*0.2)+(r.scores.service*0.2)+(r.scores.value*0.2)+(r.scores.wait*0.1));
        return sum + overall;
      }, 0);
      const average = confidenceSum / reports.length;
      
      $('#stat-total').textContent = reports.length;
      $('#stat-verified').textContent = verified;
      $('#stat-average').textContent = (average * 10).toFixed(0) + '%';
    }

    function showBrowse() {
      $('#browse-page').style.display = 'block';
      $('#form-page').classList.remove('active');
      history.replaceState(null, '', 'community.html');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showForm() {
      $('#browse-page').style.display = 'none';
      $('#form-page').classList.add('active');
      history.replaceState(null, '', 'community.html#write');
      goStep(1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goStep(step) {
      $$('.form-step').forEach(panel => panel.classList.toggle('active', panel.dataset.step === String(step)));
      $$('[data-step-pill]').forEach(pill => pill.classList.toggle('active', Number(pill.dataset.stepPill) <= Number(step)));
    }

    function renderSliders() {
      $('#sliders').innerHTML = dimensions.map(dim => `
        <div class="slider-row" style="display:grid;grid-template-columns:160px minmax(0, 1fr) 48px;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(30,30,27,0.12);">
          <strong>${dim.label}</strong>
          <input type="range" min="1" max="10" step="0.1" value="${state.form.scores[dim.key]}" data-score="${dim.key}" style="accent-color:var(--cyan);width:100%;">
          <span class="slider-value" id="value-${dim.key}" style="font-family:var(--mono);color:var(--cyan);font-weight:900;text-align:right;">${state.form.scores[dim.key].toFixed(1)}</span>
        </div>
      `).join('');
    }

    function updateComposite() {
      const s = state.form.scores;
      const score = ((s.food * 0.3) + (s.ambience * 0.2) + (s.service * 0.2) + (s.value * 0.2) + (s.wait * 0.1)).toFixed(1);
      $('#composite-score').textContent = score;
      return score;
    }

    function validatePlace() {
      state.form.place = $('#place-input').value.trim();
      $('#step-1-next').disabled = !state.form.place;
    }

    function validateSubmit() {
      $('#submit-btn').disabled = !(HTMLInputElement && ($('#handle-input').value.trim()) && ($('#email-input').value.trim()) && $('#visited-input').checked);
    }

    function resetForm() {
      state.form = { place: '', scores: { food: 5, ambience: 5, service: 5, value: 5, wait: 5 } };
      $('#place-input').value = '';
      $('#note-input').value = '';
      $('#char-count').textContent = '0';
      $('#handle-input').value = '';
      $('#email-input').value = '';
      $('#visited-input').checked = false;
      $$('.quick-place').forEach(button => button.classList.remove('active'));
      renderSliders();
      updateComposite();
      validatePlace();
      validateSubmit();
      goStep(1);
    }

    function submitReport() {
      const score = Number(updateComposite());
      reports.unshift({
        id: Date.now(),
        cafe: state.form.place.includes(',') ? state.form.place.split(',')[0].trim() : state.form.place,
        zone: state.form.place.includes(',') ? state.form.place.split(',').pop().trim() : 'Cyber Hub',
        score,
        scores: { ...state.form.scores },
        note: $('#note-input').value.trim() || 'No note added.',
        verified: true,
        flagged: false,
        trustLevel: 'standard',
        reviewer: $('#handle-input').value.trim() || '@anonymous',
        time: 'just now',
        daysAgo: 0,
        reactions: { accurate: 0, outdated: 0, helpful: 0 }
      });
      $('#success-box').innerHTML = `
        &gt; Report submitted<br>
        &gt; Place: ${state.form.place}<br>
        &gt; Trust score: ${score.toFixed(1)}/10<br>
        &gt; Status: indexed in the Commons
      `;
      $$('.form-step').forEach(panel => panel.classList.toggle('active', panel.dataset.step === 'success'));
      $$('[data-step-pill]').forEach(pill => pill.classList.add('active'));
      renderStats();
      renderReports();
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTicker();
      renderStats();
      renderReports();
      renderSliders();
      updateComposite();

      $('#nav-write-btn').addEventListener('click', showForm);
      $('#hero-write-btn').addEventListener('click', showForm);
      $('#back-to-community').addEventListener('click', showBrowse);
      $('#success-back-btn').addEventListener('click', showBrowse);
      $('#new-report-btn').addEventListener('click', resetForm);

      $('#search-input').addEventListener('input', event => {
        state.search = event.target.value;
        renderReports();
      });

      $('#sort-select').addEventListener('change', event => {
        state.sort = event.target.value;
        renderReports();
      });

      $('#status-filters').addEventListener('click', event => {
        const button = event.target.closest('[data-filter]');
        if (!button) return;
        state.filter = button.dataset.filter;
        $$('#status-filters .ch-pill').forEach(item => item.classList.toggle('active', item === button));
        renderReports();
      });

      $('#zone-filters').addEventListener('click', event => {
        const button = event.target.closest('[data-zone]');
        if (!button) return;
        state.zone = button.dataset.zone;
        $$('#zone-filters .ch-pill').forEach(item => item.classList.toggle('active', item === button));
        renderReports();
      });

      $('#feed-list').addEventListener('click', event => {
        const button = event.target.closest('.ch-react');
        if (!button) return;
        
        const reactionType = button.dataset.reaction;
        const reportId = Number(button.dataset.id);
        const report = reports.find(r => r.id === reportId);
        
        if (report) {
          if (!button.classList.contains('reacted')) {
            button.classList.add('reacted');
            report.reactions[reactionType]++;
          } else {
            button.classList.remove('reacted');
            report.reactions[reactionType]--;
          }
          const span = button.querySelector('span');
          if (span) {
            span.textContent = report.reactions[reactionType];
          }
        }
      });

      // Load More Reports click simulation
      $('#load-more').addEventListener('click', () => {
        alert('All verified NCR intelligence feeds have been fully loaded.');
      });

      $('#place-input').addEventListener('input', validatePlace);
      $$('.quick-place').forEach(button => {
        button.addEventListener('click', () => {
          $$('.quick-place').forEach(item => item.classList.remove('active'));
          button.classList.add('active');
          $('#place-input').value = button.dataset.place;
          validatePlace();
        });
      });

      $('#step-1-next').addEventListener('click', () => goStep(2));
      $('#step-2-next').addEventListener('click', () => goStep(3));
      $('#step-3-next').addEventListener('click', () => goStep(4));
      $$('.back-step').forEach(button => button.addEventListener('click', () => goStep(button.dataset.back)));

      $('#sliders').addEventListener('input', event => {
        const input = event.target.closest('[data-score]');
        if (!input) return;
        state.form.scores[input.dataset.score] = Number(input.value);
        $(`#value-${input.dataset.score}`).textContent = Number(input.value).toFixed(1);
        updateComposite();
      });

      $('#note-input').addEventListener('input', event => {
        $('#char-count').textContent = event.target.value.length;
      });
      $('#handle-input').addEventListener('input', validateSubmit);
      $('#email-input').addEventListener('input', validateSubmit);
      $('#visited-input').addEventListener('change', validateSubmit);
      $('#submit-btn').addEventListener('click', submitReport);

      // ── Custom Cybernetic Cursor Tracking ───────────────────────────
      (function () {
        const isFinePointer = window.matchMedia('(pointer: fine)').matches;
        if (!isFinePointer) return;

        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        if (!dot || !ring) return;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        let ringX = mouseX;
        let ringY = mouseY;
        let dotX = mouseX;
        let dotY = mouseY;

        window.addEventListener('mousemove', e => {
          mouseX = e.clientX;
          mouseY = e.clientY;
        }, { passive: true });

        document.addEventListener('mouseleave', () => {
          dot.style.opacity = '0';
          ring.style.opacity = '0';
        });
        document.addEventListener('mouseenter', () => {
          dot.style.opacity = '1';
          ring.style.opacity = '1';
        });

        function updateCursor() {
          // Instant dot lock for zero lag feel
          dotX += (mouseX - dotX);
          dotY += (mouseY - dotY);
          dot.style.transform = `translate3d(${dotX}px, ${dotY}px, 0)`;

          // Spring damped trailing ring
          ringX += (mouseX - ringX) * 0.15;
          ringY += (mouseY - ringY) * 0.15;
          ring.style.transform = `translate3d(${ringX}px, ${ringY}px, 0)`;

          requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

        // Hover effect for interactive elements on Snyf Commons
        const hoverTargets = 'a, button, input, select, textarea, [role="button"], .ch-card, .ch-pill, .ch-react, .quick-place';
        
        document.addEventListener('mouseover', e => {
          if (e.target && e.target.closest(hoverTargets)) {
            document.body.classList.add('cursor-hovering');
          }
        }, { passive: true });

        document.addEventListener('mouseout', e => {
          if (e.target && !e.target.closest(hoverTargets)) {
            document.body.classList.remove('cursor-hovering');
          }
        }, { passive: true });
      })();

      if (location.hash === '#write') showForm();
    });
  </script>
</body>
</html>
